openapi: 3.0.3
info:
  title: PsicoSistem Backend API
  version: 1.0.0
  description: Fundacao SaaS multi-tenant para psicopedagogia.
servers:
  - url: http://localhost:8080
paths:
  /v1/health:
    get:
      summary: Verifica se a API esta ativa
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /v1/auth/register:
    post:
      summary: Cria tenant, owner e assinatura inicial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Tenant criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
  /v1/auth/login:
    post:
      summary: Login de usuarios internos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Sessao autenticada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
  /v1/auth/refresh:
    post:
      summary: Renova o token JWT
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token renovado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
  /v1/tenant/me:
    get:
      summary: Retorna os dados da clinica autenticada
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSuccess'
  /v1/tenant/subscription:
    get:
      summary: Retorna plano e assinatura atual do tenant
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Assinatura atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionSuccess'
  /v1/permissions/me:
    get:
      summary: Retorna as permissões efetivas da conta autenticada
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Permissões da sessão atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionSuccess'
  /v1/users/me:
    get:
      summary: Retorna o usuario autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccess'
  /v1/users:
    get:
      summary: Lista usuarios internos da clinica
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListSuccess'
    post:
      summary: Cria usuario interno do tenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserInput'
      responses:
        '201':
          description: Usuario criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccess'
  /v1/users/{id}:
    get:
      summary: Compatibilidade reservada para futuro detalhe do usuário
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '405':
          description: Não implementado
    patch:
      summary: Atualiza usuario interno
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserInput'
      responses:
        '200':
          description: Usuario atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccess'
    delete:
      summary: Desativa usuario interno
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Usuario desativado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /v1/users/{id}/permissions:
    get:
      summary: Retorna as permissões de uma conta do tenant
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Permissões da conta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionSuccess'
    patch:
      summary: Atualiza as permissões de uma conta do tenant
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionInput'
      responses:
        '200':
          description: Permissões atualizadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionSuccess'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    ApiSuccess:
      type: object
      properties:
        data:
          nullable: true
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    RegisterInput:
      type: object
      required: [clinic_name, name, email, password, phone, cpf_cnpj, plan_slug, payment_session_confirmed]
      properties:
        clinic_name:
          type: string
        name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
        cpf_cnpj:
          type: string
        plan_slug:
          type: string
          enum: [basico, intermediario, premium]
        payment_session_confirmed:
          type: boolean
        accept_trial_terms:
          type: boolean
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    CreateUserInput:
      type: object
      required: [name, email, password, role, status]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [owner, admin, coordinator, professional, financial]
        status:
          type: string
          enum: [active, inactive]
    UpdateUserInput:
      type: object
      required: [name, email, role, status]
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [owner, admin, coordinator, professional, financial]
        status:
          type: string
          enum: [active, inactive]
    AccountPermissions:
      type: object
      properties:
        user_directory:
          type: string
          enum: [none, own, all]
        patients:
          type: string
          enum: [none, own, all]
        services:
          type: string
          enum: [none, own, all]
        calendar:
          type: string
          enum: [none, own, all]
        finance:
          type: string
          enum: [none, own, all]
        ai_history:
          type: string
          enum: [none, own, all]
        plans:
          type: string
          enum: [none, own, all]
    UpdatePermissionInput:
      type: object
      required: [permissions]
      properties:
        permissions:
          $ref: '#/components/schemas/AccountPermissions'
    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        email:
          type: string
        phone:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    User:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
        permissions:
          $ref: '#/components/schemas/AccountPermissions'
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SubscriptionSummary:
      type: object
      properties:
        plan:
          type: string
        status:
          type: string
        amount_monthly:
          type: integer
        next_amount_monthly:
          type: integer
        renewal_at:
          type: string
          format: date-time
          nullable: true
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
        has_tests_library:
          type: boolean
        has_ai:
          type: boolean
        has_guardian_portal:
          type: boolean
        max_professionals:
          type: integer
        max_patients:
          type: integer
    AuthPayload:
      type: object
      properties:
        tenant:
          $ref: '#/components/schemas/Tenant'
        user:
          $ref: '#/components/schemas/User'
        subscription:
          $ref: '#/components/schemas/SubscriptionSummary'
        token:
          type: string
    AuthSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AuthPayload'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    TenantSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Tenant'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    SubscriptionSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SubscriptionSummary'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    PermissionPayload:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        role:
          type: string
        can_manage_users:
          type: boolean
        permissions:
          $ref: '#/components/schemas/AccountPermissions'
    PermissionSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PermissionPayload'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    UserSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    UserListSuccess:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            total_pages:
              type: integer
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
