openapi: 3.0.3
info:
  title: PsicoSistem Backend API
  version: 1.0.0
  description: Fundacao SaaS multi-tenant para psicopedagogia.
servers:
  - url: http://localhost:8080
paths:
  /v1/health:
    get:
      summary: Verifica se a API esta ativa
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /v1/auth/register:
    post:
      summary: Cria tenant, owner e assinatura inicial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Tenant criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
  /v1/auth/login:
    post:
      summary: Login de usuarios internos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Sessao autenticada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
  /v1/auth/refresh:
    post:
      summary: Renova o token JWT
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token renovado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
  /v1/tenant/me:
    get:
      summary: Retorna os dados da clinica autenticada
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSuccess'
  /v1/tenant/subscription:
    get:
      summary: Retorna plano e assinatura atual do tenant
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Assinatura atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionSuccess'
  /v1/permissions/me:
    get:
      summary: Retorna as permissões efetivas da conta autenticada
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Permissões da sessão atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionSuccess'
  /v1/users/me:
    get:
      summary: Retorna o usuario autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccess'
  /v1/users:
    get:
      summary: Lista usuarios internos da clinica
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListSuccess'
    post:
      summary: Cria usuario interno do tenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserInput'
      responses:
        '201':
          description: Usuario criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccess'
  /v1/users/{id}:
    get:
      summary: Compatibilidade reservada para futuro detalhe do usuário
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '405':
          description: Não implementado
    patch:
      summary: Atualiza usuario interno
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserInput'
      responses:
        '200':
          description: Usuario atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccess'
    delete:
      summary: Desativa usuario interno
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Usuario desativado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /v1/users/{id}/permissions:
    get:
      summary: Retorna as permissões de uma conta do tenant
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Permissões da conta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionSuccess'
    patch:
      summary: Atualiza as permissões de uma conta do tenant
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionInput'
      responses:
        '200':
          description: Permissões atualizadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionSuccess'
  /v1/learners:
    get:
      summary: Lista aprendentes da clínica
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, inactive]
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Lista paginada de aprendentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearnerListSuccess'
    post:
      summary: Cria aprendente com valor de sessão
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLearnerInput'
      responses:
        '201':
          description: Aprendente criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearnerSuccess'
  /v1/learners/{id}:
    get:
      summary: Retorna um aprendente da clínica
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Aprendente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearnerSuccess'
    patch:
      summary: Atualiza aprendente e valor de sessão
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLearnerInput'
      responses:
        '200':
          description: Aprendente atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearnerSuccess'
    delete:
      summary: Desativa aprendente
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Aprendente desativado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /v1/guardians:
    get:
      summary: Lista responsáveis da clínica
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Lista paginada de responsáveis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuardianListSuccess'
    post:
      summary: Cria responsável
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuardianInput'
      responses:
        '201':
          description: Responsável criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuardianSuccess'
  /v1/guardians/{id}:
    get:
      summary: Retorna um responsável da clínica
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Responsável encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuardianSuccess'
    patch:
      summary: Atualiza responsável
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGuardianInput'
      responses:
        '200':
          description: Responsável atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuardianSuccess'
    delete:
      summary: Remove responsável sem aprendentes vinculados
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Responsável removido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    ApiSuccess:
      type: object
      properties:
        data:
          nullable: true
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    RegisterInput:
      type: object
      required: [clinic_name, name, email, password, phone, cpf_cnpj, plan_slug, payment_session_confirmed]
      properties:
        clinic_name:
          type: string
        name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
        cpf_cnpj:
          type: string
        plan_slug:
          type: string
          enum: [basico, intermediario, premium]
        payment_session_confirmed:
          type: boolean
        accept_trial_terms:
          type: boolean
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    CreateUserInput:
      type: object
      required: [name, email, password, role, status]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [owner, admin, coordinator, professional, financial]
        status:
          type: string
          enum: [active, inactive]
    UpdateUserInput:
      type: object
      required: [name, email, role, status]
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [owner, admin, coordinator, professional, financial]
        status:
          type: string
          enum: [active, inactive]
    CreateLearnerInput:
      type: object
      required: [name, guardian_ids]
      properties:
        name:
          type: string
        photo_url:
          type: string
        gender:
          type: string
        guardian:
          type: string
        age:
          type: string
        status:
          type: string
          enum: [active, inactive]
        start_date:
          type: string
          example: '2026-05-05'
        end_date:
          type: string
          example: '2026-06-05'
        visit_count:
          type: integer
        session_price_cents:
          type: integer
          format: int64
          description: Valor padrao por sessao do aprendente, em centavos.
        general_value_cents:
          type: integer
          format: int64
          description: Valor geral/contratado do aprendente, em centavos.
        guardian_ids:
          type: array
          minItems: 1
          maxItems: 2
          description: IDs dos responsáveis vinculados ao aprendente.
          items:
            type: string
            format: uuid
    UpdateLearnerInput:
      allOf:
        - $ref: '#/components/schemas/CreateLearnerInput'
    CreateGuardianInput:
      type: object
      required: [name, phone, address]
      properties:
        name:
          type: string
        relationship:
          type: string
          description: Parentesco do responsável, como mãe, pai, avó ou tio.
        phone:
          type: string
          description: Número de telefone com 10 ou 11 dígitos.
        address:
          type: string
        cpf:
          type: string
          nullable: true
          description: CPF opcional do responsável.
    UpdateGuardianInput:
      allOf:
        - $ref: '#/components/schemas/CreateGuardianInput'
    AccountPermissions:
      type: object
      properties:
        user_directory:
          type: string
          enum: [none, own, all]
        patients:
          type: string
          enum: [none, own, all]
        services:
          type: string
          enum: [none, own, all]
        calendar:
          type: string
          enum: [none, own, all]
        finance:
          type: string
          enum: [none, own, all]
        ai_history:
          type: string
          enum: [none, own, all]
        plans:
          type: string
          enum: [none, own, all]
    UpdatePermissionInput:
      type: object
      required: [permissions]
      properties:
        permissions:
          $ref: '#/components/schemas/AccountPermissions'
    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        email:
          type: string
        phone:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    User:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
        permissions:
          $ref: '#/components/schemas/AccountPermissions'
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Learner:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        photo_url:
          type: string
        gender:
          type: string
        guardian:
          type: string
        age:
          type: string
        status:
          type: string
          enum: [active, inactive]
        start_date:
          type: string
        end_date:
          type: string
        visit_count:
          type: integer
        session_price_cents:
          type: integer
          format: int64
          description: Valor padrao por sessao do aprendente, em centavos.
        general_value_cents:
          type: integer
          format: int64
          description: Valor geral/contratado do aprendente, em centavos.
        guardian_ids:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Guardian:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        relationship:
          type: string
        phone:
          type: string
        address:
          type: string
        cpf:
          type: string
          nullable: true
        learner_ids:
          type: array
          description: Aprendentes vinculados a este responsável.
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SubscriptionSummary:
      type: object
      properties:
        plan:
          type: string
        status:
          type: string
        amount_monthly:
          type: integer
        next_amount_monthly:
          type: integer
        renewal_at:
          type: string
          format: date-time
          nullable: true
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
        has_tests_library:
          type: boolean
        has_ai:
          type: boolean
        has_guardian_portal:
          type: boolean
        max_professionals:
          type: integer
        max_patients:
          type: integer
    AuthPayload:
      type: object
      properties:
        tenant:
          $ref: '#/components/schemas/Tenant'
        user:
          $ref: '#/components/schemas/User'
        subscription:
          $ref: '#/components/schemas/SubscriptionSummary'
        token:
          type: string
    AuthSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AuthPayload'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    TenantSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Tenant'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    SubscriptionSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SubscriptionSummary'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    PermissionPayload:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        role:
          type: string
        can_manage_users:
          type: boolean
        permissions:
          $ref: '#/components/schemas/AccountPermissions'
    PermissionSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PermissionPayload'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    UserSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    UserListSuccess:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            total_pages:
              type: integer
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    LearnerSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Learner'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    LearnerListSuccess:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Learner'
        meta:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            total_pages:
              type: integer
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    GuardianSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Guardian'
        meta:
          nullable: true
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
    GuardianListSuccess:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Guardian'
        meta:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            total_pages:
              type: integer
        error:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ApiError'
